name: Build

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const fs=require('fs');const v=process.argv[1].replace(/^v/,'');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version=v;c.bundle.createUpdaterArtifacts=true;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n')" ${{ github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: yarn }
      - run: yarn install --frozen-lockfile
      - run: yarn tauri build --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - name: Generate latest.json
        run: node .github/scripts/gen-update-json.mjs darwin-x86_64 ${{ github.ref_name }} ${{ github.repository }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - run: find src-tauri/target/release/bundle -type f -name '.VolumeIcon.icns' -delete
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: src-tauri/target/release/bundle/

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const fs=require('fs');const v=process.argv[1].replace(/^v/,'');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version=v;c.bundle.createUpdaterArtifacts=true;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n')" ${{ github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: yarn }
      - run: yarn install --frozen-lockfile
      - run: yarn tauri build --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - name: Generate latest.json
        run: node .github/scripts/gen-update-json.mjs darwin-aarch64 ${{ github.ref_name }} ${{ github.repository }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - run: find src-tauri/target/release/bundle -type f -name '.VolumeIcon.icns' -delete
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: src-tauri/target/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const fs=require('fs');const v=process.argv[1].replace(/^v/,'');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version=v;c.bundle.createUpdaterArtifacts=true;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n')" ${{ github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: yarn }
      - run: yarn install --frozen-lockfile
      - run: yarn tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - name: Generate latest.json
        run: node .github/scripts/gen-update-json.mjs windows-x86_64 ${{ github.ref_name }} ${{ github.repository }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/bundle/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const fs=require('fs');const v=process.argv[1].replace(/^v/,'');const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));c.version=v;c.bundle.createUpdaterArtifacts=true;fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(c,null,2)+'\n')" ${{ github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: yarn }
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev
      - run: yarn install --frozen-lockfile
      - run: yarn tauri build --bundles appimage,deb
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
      - name: Generate latest.json
        run: node .github/scripts/gen-update-json.mjs linux-x86_64 ${{ github.ref_name }} ${{ github.repository }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: src-tauri/target/release/bundle/

  release:
    needs: [build-macos-x64, build-macos-arm64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Merge latest.json from all platforms
        run: |
          FILES=($(find . -name "latest.json" -type f))
          cp "${FILES[0]}" merged.json
          for f in "${FILES[@]:1}"; do
            jq -s '. as [$base, $add] | $base.platforms += $add.platforms | $base' merged.json "$f" > _tmp.json
            mv _tmp.json merged.json
          done
          mv merged.json latest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.dmg
            **/*.exe
            **/*.msi
            **/*.AppImage
            **/*.deb
            **/*.sig
            **/*.tar.gz
            latest.json
          generate_release_notes: true
